- name: Update apt cache
  apt:
    update_cache: yes

- name: Install containerd on ubuntu nodes
  apt:
    name: containerd
    state: present

- name: Create containerd configuration directory
  file:
    path: /etc/containerd
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Deploy containerd config for Rocky
  copy:
    src: config_ubuntu.toml
    dest: /etc/containerd/config.toml
    owner: root
    group: root
    mode: '0644'

- name: Enable and start containerd
  systemd:
    name: containerd
    enabled: true
    state: started
