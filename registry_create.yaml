---
- name: Registry creator for project_1 playbook
  hosts: k8s_nodes
  become: true
  tasks:
    - name: Create registry container structure
      ansible.builtin.file:
        path: /etc/containerd/certs.d/192.168.0.101:5000
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Fix containerd config_path on Rocky
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'config_path\s*=\s*''.*'''
        replace: "config_path = '/etc/containerd/certs.d'"
        backup: yes
      when: ansible_os_family == "RedHat"
      notify: Restart containerd

    - name: Send-copy configuration file to registry container structure
      ansible.builtin.copy:
        src: files/hosts.toml
        dest: /etc/containerd/certs.d/192.168.0.101:5000/hosts.toml
        mode: '0644'
        owner: root
        group: root
      notify: Restart containerd

  handlers:
    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted
